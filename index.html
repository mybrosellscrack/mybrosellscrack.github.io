<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Духовный дневник</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="title">Духовный дневник</div>
        <div class="subtitle">Временная веб-версия</div>
      </div>
    </header>

    <main class="app-main">
      <section id="view-home" class="view active">
        <div class="card menu-card">
          <h2>Главное меню</h2>
          <p class="notice">
            Важно: раз в неделю делайте экспорт данных, чтобы иметь резервную копию.
          </p>
          <div class="menu-grid">
            <button class="btn primary" data-nav="new">Новая запись</button>
            <button class="btn" data-nav="archive">Архив</button>
            <button class="btn" data-nav="confession">Подготовка к исповеди</button>
            <button class="btn" data-nav="stats">Статистика</button>
            <button class="btn" data-nav="backup">Резерв / Восстановление</button>
            <button class="btn danger" id="reset-data">Сбросить данные</button>
          </div>
        </div>
      </section>

      <section id="view-new" class="view">
        <div class="card">
          <div class="view-header">
            <button class="btn ghost" data-nav="home">Домой</button>
            <h2>Новая запись</h2>
          </div>
          <form id="new-entry-form" class="form">
            <label>
              Ситуация (обязательно)
              <input type="text" name="situation" required />
            </label>
            <label>
              Контекст (необязательно)
              <textarea name="context" rows="2"></textarea>
            </label>
            <label>
              Последствие (обязательно)
              <textarea name="consequence" rows="2" required></textarea>
            </label>
            <label>
              Инсайт (обязательно)
              <textarea name="insight" rows="2" required></textarea>
            </label>
            <button type="submit" class="btn primary">Сохранить</button>
          </form>
        </div>
      </section>

      <section id="view-archive" class="view">
        <div class="card">
          <div class="view-header">
            <button class="btn ghost" data-nav="home">Домой</button>
            <h2>Архив</h2>
          </div>
          <div id="archive-list" class="list"></div>
          <p id="archive-empty" class="empty">Записей пока нет.</p>
        </div>
      </section>

      <section id="view-confession" class="view">
        <div class="card">
          <div class="view-header">
            <button class="btn ghost" data-nav="home">Домой</button>
            <h2>Подготовка к исповеди</h2>
          </div>
          <div id="confession-list" class="list"></div>
          <p id="confession-empty" class="empty">Нет недель для отображения.</p>
        </div>
      </section>

      <section id="view-stats" class="view">
        <div class="card">
          <div class="view-header">
            <button class="btn ghost" data-nav="home">Домой</button>
            <h2>Статистика</h2>
          </div>
          <div id="stats-list" class="list"></div>
          <p id="stats-empty" class="empty">Данных пока нет.</p>
        </div>
      </section>

      <section id="view-backup" class="view">
        <div class="card">
          <div class="view-header">
            <button class="btn ghost" data-nav="home">Домой</button>
            <h2>Резерв / Восстановление</h2>
          </div>
          <div class="backup-actions">
            <button class="btn primary" id="export-csv">Экспорт CSV</button>
            <label class="btn">
              Импорт CSV
              <input type="file" id="import-csv" accept=".csv,text/csv,text/plain" />
            </label>
            <p id="backup-status" class="status"></p>
          </div>
        </div>
      </section>
    </main>

    <div id="edit-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <h3>Редактировать запись</h3>
        <form id="edit-entry-form" class="form">
          <label>
            Ситуация (обязательно)
            <input type="text" name="situation" required />
          </label>
          <label>
            Контекст (необязательно)
            <textarea name="context" rows="2"></textarea>
          </label>
          <label>
            Последствие (обязательно)
            <textarea name="consequence" rows="2" required></textarea>
          </label>
          <label>
            Инсайт (обязательно)
            <textarea name="insight" rows="2" required></textarea>
          </label>
          <div class="modal-actions">
            <button type="button" class="btn ghost" id="edit-cancel">Отмена</button>
            <button type="submit" class="btn primary">Сохранить</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
